<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지혜의 서사꾼</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-stone-50 min-h-screen p-6 flex flex-col items-center font-serif">
    <div class="w-full max-w-lg bg-white p-8 rounded-2xl shadow-xl mt-10 text-center">
        <h1 class="text-2xl font-bold mb-8 text-stone-800">지혜의 서사꾼</h1>
        <input type="password" id="apiKey" class="w-full mb-4 p-3 border rounded-lg text-sm shadow-sm focus:outline-none" placeholder="Gemini API 키를 입력하세요">
        <textarea id="userInput" rows="4" class="w-full p-4 border rounded-xl focus:ring-2 focus:ring-stone-400 outline-none shadow-sm" placeholder="지금 어떤 고뇌가 있나요?"></textarea>
        <button onclick="ask()" id="btn" class="w-full mt-6 py-4 bg-stone-800 text-white rounded-xl font-bold hover:bg-black transition-all">부처님께 여쭙기</button>
    </div>
    <div id="res" class="hidden w-full max-w-lg mt-8 p-8 bg-white rounded-2xl shadow-lg border-l-8 border-stone-800">
        <div id="wisdomText" class="text-lg italic leading-relaxed text-stone-900 whitespace-pre-wrap mb-6"></div>
        <div id="tip" class="pt-6 border-t border-stone-100 text-sm text-stone-600 font-sans"></div>
    </div>

    <script>
        async function ask() {
            const input = document.getElementById('userInput').value;
            const key = document.getElementById('apiKey').value;
            const btn = document.getElementById('btn');
            if(!input || !key) return alert("내용과 키를 입력하세요.");

            btn.disabled = true;
            btn.innerText = "답변을 가져오는 중...";

            // [최종 해결] 가장 표준적인 gemini-pro 모델을 사용합니다.
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${key}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `부처와 수보리의 대화 형식으로 답변해줘. 고민: ${input}. 마지막엔 '오늘의 명상 실천법:' 이라고 써줘.` }] }]
                    })
                });
                const data = await response.json();
                
                if (data.error) throw new Error(data.error.message);

                const txt = data.candidates[0].content.parts[0].text;
                const parts = txt.split('오늘의 명상 실천법:');
                document.getElementById('res').classList.remove('hidden');
                document.getElementById('wisdomText').innerText = parts[0].trim();
                document.getElementById('tip').innerText = "📍 명상 가이드: " + (parts[1] || "깊게 호흡하세요.").trim();
            } catch (e) {
                alert("알림: " + e.message + "\n\n(API 키가 'Gemini API'용이 맞는지 확인해 주세요)");
            } finally {
                btn.disabled = false;
                btn.innerText = "부처님께 여쭙기";
            }
        }
    </script>
</body>
</html>
