<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지혜의 서사꾼</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Serif KR', serif; background-color: #f4f1ea; color: #2c2c2c; }
        .wisdom-card { background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        #wisdomText { white-space: pre-wrap; }
    </style>
</head>
<body class="min-h-screen p-6 flex flex-col items-center">

    <header class="text-center my-8">
        <h1 class="text-2xl font-bold text-stone-800">지혜의 서사꾼</h1>
    </header>

    <main class="w-full max-w-xl space-y-6">
        <div class="wisdom-card p-6">
            <input type="password" id="apiKey" class="w-full mb-4 p-2 border rounded text-sm" placeholder="Gemini API Key 입력">
            <textarea id="userInput" rows="3" class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-stone-400" placeholder="고민을 짧게 적어주세요..."></textarea>
            <button onclick="generate()" id="btn" class="w-full mt-4 py-3 bg-stone-800 text-white rounded-lg font-bold">대화 시작하기</button>
        </div>

        <div id="res" class="hidden space-y-4">
            <div class="wisdom-card p-6 italic border-l-4 border-stone-500" id="wisdomText"></div>
            <div id="tip" class="p-4 bg-stone-800 text-white rounded-lg text-sm"></div>
        </div>
    </main>

    <script>
        async function generate() {
            const input = document.getElementById('userInput').value;
            const key = document.getElementById('apiKey').value;
            const btn = document.getElementById('btn');
            
            if(!input || !key) return alert("입력값을 확인하세요.");

            btn.disabled = true;
            btn.innerText = "답변 생성 중...";

            // 모델 명칭을 가장 확실한 'gemini-1.5-flash-latest'로 변경
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${key}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `부처와 수보리의 대화 형식으로 다음 고민에 답해줘: ${input}. 마지막에 '오늘의 명상 실천법:'을 포함해줘.` }] }]
                    })
                });

                const data = await response.json();
                
                if (data.error) throw new Error(data.error.message);

                const txt = data.candidates[0].content.parts[0].text;
                const parts = txt.split('오늘의 명상 실천법:');

                document.getElementById('res').classList.remove('hidden');
                document.getElementById('wisdomText').innerText = parts[0].trim();
                document.getElementById('tip').innerText = "📍 명상 가이드: " + (parts[1] || "숨을 고르세요.").trim();
                
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            } catch (e) {
                alert("에러 발생: " + e.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "대화 시작하기";
            }
        }
    </script>
</body>
</html>
