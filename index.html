<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지혜의 서사꾼 | 수보리의 거울</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Serif KR', serif; background-color: #f4f1ea; color: #2c2c2c; }
        .typing { border-right: 2px solid #8b7355; animation: blink 0.75s step-end infinite; }
        @keyframes blink { from, to { border-color: transparent } 50% { border-color: #8b7355; } }
        .wisdom-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border-radius: 15px; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6 sm:p-12">

    <header class="text-center mb-12">
        <h1 class="text-3xl font-bold text-stone-800 mb-2">지혜의 서사꾼</h1>
        <p class="text-sm text-stone-500 italic">초기 경전과 현대 영성의 만남</p>
    </header>

    <main class="w-full max-w-2xl space-y-8">
        <section class="wisdom-card p-6">
            <label class="block text-lg font-medium mb-4 text-stone-700">지금 마음을 괴롭히는 파도는 무엇입니까?</label>
            <textarea id="userInput" rows="3" class="w-full p-4 bg-transparent border-b-2 border-stone-300 focus:outline-none focus:border-stone-600 transition-colors resize-none" placeholder="예: 미래에 대한 불안, 팀원과의 갈등..."></textarea>
            <button onclick="generateWisdom()" id="submitBtn" class="mt-6 w-full py-3 bg-stone-800 text-white rounded-lg hover:bg-stone-700 transition-all font-bold">부처님께 여쭙기</button>
        </section>

        <section class="text-center">
            <input type="password" id="apiKey" class="text-xs p-2 bg-transparent border border-stone-300 rounded" placeholder="Gemini API Key를 입력하세요">
            <p class="text-[10px] text-stone-400 mt-1">* API Key는 브라우저에만 저장되며 서버로 전송되지 않습니다.</p>
        </section>

        <section id="resultArea" class="hidden space-y-6">
            <div class="wisdom-card p-8 leading-relaxed text-lg italic text-stone-800" id="wisdomText">
                </div>
            <div id="meditationTip" class="p-4 bg-stone-200 rounded-lg text-sm text-stone-600 border-l-4 border-stone-500">
                </div>
        </section>
    </main>

    <footer class="mt-auto py-8 text-stone-400 text-xs">
        © 2026 수보리의 거울. 현존하는 마음을 위하여.
    </footer>

    <script>
        async function generateWisdom() {
            const userInput = document.getElementById('userInput').value;
            const apiKey = document.getElementById('apiKey').value;
            const resultArea = document.getElementById('resultArea');
            const wisdomText = document.getElementById('wisdomText');
            const meditationTip = document.getElementById('meditationTip');
            const submitBtn = document.getElementById('submitBtn');

            if (!userInput || !apiKey) {
                alert("고민 내용과 API Key를 모두 입력해주세요.");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = "부처님의 침묵 속에서...";
            resultArea.classList.add('hidden');

            const prompt = `너는 초기 불교 경전의 깊이와 현대 영성가 에크하르트 톨레의 통찰을 결합한 '스토리텔링 마스터'야.
사용자의 고민: "${userInput}"
형식: 부처님과 수보리의 대화.
내용 가이드라인:
1. 배경은 기원전 5세기 인도의 고요한 밤.
2. 수보리는 우리 시대의 인간적인 고뇌를 대변함.
3. 에크하르트 톨레의 '현존'과 MBSR의 '수용' 개념을 녹여낼 것.
4. 마지막에는 "오늘의 명상 실천법: [내용]" 한 줄을 포함할 것.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();
                const fullText = data.candidates[0].content.parts[0].text;
                
                // 분리: 스토리와 명상 팁
                const parts = fullText.split('오늘의 명상 실천법:');
                
                resultArea.classList.remove('hidden');
                wisdomText.innerText = parts[0].trim();
                meditationTip.innerText = "📍 오늘의 명상: " + (parts[1] || "호흡에 잠시 머무르세요.").trim();
                
            } catch (error) {
                alert("오류가 발생했습니다: " + error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "부처님께 여쭙기";
            }
        }
    </script>
</body>
</html>
