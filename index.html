<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지혜의 서사꾼 | 수보리의 거울</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Serif KR', serif; background-color: #f4f1ea; color: #2c2c2c; line-height: 1.8; }
        .wisdom-card { background: rgba(255, 255, 255, 0.9); border-radius: 15px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); }
        #wisdomText { white-space: pre-wrap; word-break: keep-all; }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #4a4a4a; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6 sm:p-12">

    <header class="text-center my-10">
        <h1 class="text-3xl font-bold text-stone-800 tracking-tight">지혜의 서사꾼</h1>
        <p class="text-sm text-stone-500 italic mt-2">부처님과 수보리의 대화</p>
    </header>

    <main class="w-full max-w-2xl space-y-8">
        <section class="wisdom-card p-6 border border-stone-200 shadow-sm">
            <div class="mb-6">
                <label class="block text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-1">Google AI Studio Key</label>
                <input type="password" id="apiKey" class="w-full p-3 text-sm bg-white border border-stone-200 rounded-lg focus:outline-none focus:border-stone-500" placeholder="API Key를 입력하세요">
            </div>

            <label class="block text-lg font-medium mb-4 text-stone-700">지금 마음을 괴롭히는 파도는 무엇입니까?</label>
            <textarea id="userInput" rows="4" class="w-full p-4 bg-white border border-stone-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-stone-200 transition-all resize-none shadow-inner" placeholder="예: 오늘따라 마음이 불안하고 갈피를 잡지 못하겠습니다."></textarea>
            
            <button onclick="generateWisdom()" id="submitBtn" class="mt-6 w-full py-4 bg-stone-800 text-white rounded-xl font-bold hover:bg-stone-700 transition-all shadow-lg active:scale-95">
                부처님께 여쭙기
            </button>
        </section>

        <section id="resultArea" class="hidden space-y-6">
            <div class="wisdom-card p-8 text-lg text-stone-800 border-l-4 border-stone-500" id="wisdomText"></div>
            <div id="meditationTip" class="p-6 bg-stone-800 text-stone-100 rounded-xl shadow-xl"></div>
        </section>
    </main>

    <footer class="mt-auto py-12 text-stone-400 text-[10px] text-center">
        © 2026 수보리의 거울. 모든 고통은 지나가는 구름과 같습니다.
    </footer>

    <script>
        async function generateWisdom() {
            const userInput = document.getElementById('userInput').value;
            const apiKey = document.getElementById('apiKey').value;
            const resultArea = document.getElementById('resultArea');
            const wisdomText = document.getElementById('wisdomText');
            const meditationTip = document.getElementById('meditationTip');
            const submitBtn = document.getElementById('submitBtn');

            if (!userInput || !apiKey) {
                alert("내용과 API Key를 모두 입력해 주세요.");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading-spinner"></span> 대화를 청하는 중...';
            resultArea.classList.add('hidden');

            // 모델명을 'gemini-1.5-flash' 대신 'gemini-pro'로 시도하거나 더 안정적인 경로 사용
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${apiKey}`;

            const systemPrompt = `너는 초기 불교 경전과 에크하르트 톨레의 통찰을 결합한 스토리텔링 마스터야. 
다음 고민에 대해 '부처와 수보리의 대화' 형식으로 답해줘.
사용자 고민: ${userInput}
조건: 마지막에 반드시 "오늘의 명상 실천법:" 문구와 팁을 포함할 것.`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: systemPrompt }] }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    // 만약 gemini-pro도 안된다면 flash-latest로 자동 전환 시도 (이중 안전장치)
                    if (data.error.message.includes("not found")) {
                        const retryUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${apiKey}`;
                        const retryRes = await fetch(retryUrl, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: systemPrompt }] }] })
                        });
                        const retryData = await retryRes.json();
                        if (retryData.error) throw new Error(retryData.error.message);
                        handleResponse(retryData);
                    } else {
                        throw new Error(data.error.message);
                    }
                } else {
                    handleResponse(data);
                }

            } catch (error) {
                alert("알림: " + error.message + "\n\nAPI 키의 활성화 여부를 확인해 주세요.");
                console.error(error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "부처님께 여쭙기";
            }

            function handleResponse(data) {
                const fullText = data.candidates[0].content.parts[0].text;
                let story = fullText;
                let tip = "숨을 고르고 현재에 머무르세요.";
                
                if (fullText.includes("오늘의 명상 실천법:")) {
                    const splitText = fullText.split("오늘의 명상 실천법:");
                    story = splitText[0].trim();
                    tip = splitText[1].trim();
                }

                resultArea.classList.remove('hidden');
                wisdomText.innerText = story;
                meditationTip.innerHTML = "<h4 class='font-bold mb-2 text-stone-300'>📍 오늘의 명상 가이드</h4>" + tip;
                window.scrollTo({ top: resultArea.offsetTop - 50, behavior: 'smooth' });
            }
        }
    </script>
</body>
</html>
