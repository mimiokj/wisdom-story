<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지혜의 서사꾼 | 수보리의 거울</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Serif KR', serif; background-color: #f4f1ea; color: #2c2c2c; line-height: 1.8; }
        .wisdom-card { background: rgba(255, 255, 255, 0.9); border-radius: 15px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); transition: all 0.5s ease; }
        #wisdomText { white-space: pre-wrap; } /* 줄바꿈 유지 */
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #4a4a4a; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6 sm:p-12">

    <header class="text-center mb-12">
        <h1 class="text-3xl font-bold text-stone-800 mb-2">지혜의 서사꾼</h1>
        <p class="text-sm text-stone-500 italic">초기 경전과 현대 영성의 만남</p>
    </header>

    <main class="w-full max-w-2xl space-y-8">
        
        <section class="wisdom-card p-6 border border-stone-200">
            <div class="mb-6">
                <label class="block text-xs font-bold text-stone-400 uppercase tracking-widest mb-2">Security</label>
                <input type="password" id="apiKey" class="w-full p-2 text-sm bg-white border border-stone-200 rounded focus:outline-none focus:border-stone-500" placeholder="Gemini API Key를 여기에 붙여넣으세요">
            </div>

            <label class="block text-lg font-medium mb-4 text-stone-700">지금 마음을 괴롭히는 파도는 무엇입니까?</label>
            <textarea id="userInput" rows="3" class="w-full p-4 bg-white border border-stone-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-stone-200 transition-all resize-none" placeholder="예: 미래에 대한 불안, 타인과의 비교..."></textarea>
            
            <button onclick="generateWisdom()" id="submitBtn" class="mt-6 w-full py-4 bg-stone-800 text-white rounded-lg hover:bg-stone-700 transition-all font-bold shadow-lg">
                부처님께 여쭙기
            </button>
        </section>

        <section id="resultArea" class="hidden space-y-6">
            <div class="wisdom-card p-8 text-lg text-stone-800 relative" id="wisdomContainer">
                <div id="wisdomText"></div>
            </div>
            <div id="meditationTip" class="p-5 bg-stone-800 text-stone-100 rounded-lg text-sm border-l-8 border-stone-500 shadow-md">
                </div>
        </section>

    </main>

    <footer class="mt-auto py-12 text-stone-400 text-[10px] text-center">
        본 서비스는 태헌 님의 평온을 위해 생성형 AI(Gemini)를 활용하여 구동됩니다.<br>
        © 2026 수보리의 거울. 모든 고통은 파도와 같습니다.
    </footer>

    <script>
        async function generateWisdom() {
            const userInput = document.getElementById('userInput').value;
            const apiKey = document.getElementById('apiKey').value;
            const resultArea = document.getElementById('resultArea');
            const wisdomText = document.getElementById('wisdomText');
            const meditationTip = document.getElementById('meditationTip');
            const submitBtn = document.getElementById('submitBtn');

            if (!userInput || !apiKey) {
                alert("고민 내용과 API Key를 모두 입력해주세요.");
                return;
            }

            // 로딩 상태 시작
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading-spinner mr-2"></span> 침묵 속에서 답을 찾는 중...';
            resultArea.classList.add('hidden');

            const systemPrompt = `너는 초기 불교 경전의 깊이와 에크하르트 톨레의 통찰을 결합한 '스토리텔링 마스터'야.
다음 사용자의 고민에 대해 '부처님과 수보리의 대화' 형식으로 답해줘.

[사용자의 고민]: ${userInput}

[작성 가이드라인]:
1. 배경은 영치산의 밤이며, 수보리는 인간적인 고뇌를 토로한다.
2. 부처님은 '현존(Presence)'과 '비판단적 수용'의 지혜로 답한다.
3. 문체는 서정적이고 평온해야 한다.
4. 마지막 줄은 반드시 "오늘의 명상 실천법: [내용]" 한 줄로 마무리한다.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: systemPrompt }] }]
                    })
                });

                const data = await response.json();

                // 상세 에러 핸들링
                if (data.error) {
                    if (data.error.message.includes("API key not valid")) {
                        throw new Error("API 키가 올바르지 않습니다. 다시 확인해주세요.");
                    }
                    throw new Error(data.error.message);
                }

                if (!data.candidates || !data.candidates[0]) {
                    throw new Error("AI가 응답을 생성할 수 없는 주제입니다. 다른 표현으로 질문해보세요.");
                }

                const fullText = data.candidates[0].content.parts[0].text;
                
                // 텍스트 분리 (이야기 vs 명상 팁)
                let mainStory = fullText;
                let tip = "숨을 깊게 들이마시고 지금 이 순간에 머무르세요.";
                
                if (fullText.includes("오늘의 명상 실천법:")) {
                    const splitParts = fullText.split("오늘의 명상 실천법:");
                    mainStory = splitParts[0].trim();
                    tip = splitParts[1].trim();
                }

                // 결과 출력
                resultArea.classList.remove('hidden');
                wisdomText.innerText = mainStory;
                meditationTip.innerHTML = "<strong>📍 오늘의 명상 가이드</strong><br>" + tip;

                // 결과창으로 부드럽게 스크롤
                window.scrollTo({ top: resultArea.offsetTop - 50, behavior: 'smooth' });

            } catch (error) {
                alert("알림: " + error.message);
                console.error("Error Detail:", error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "부처님께 여쭙기";
            }
        }
    </script>
</body>
</html>
