<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지혜의 서사꾼 | 수보리의 거울</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Serif KR', serif; background-color: #f4f1ea; color: #2c2c2c; line-height: 1.8; }
        .wisdom-card { background: rgba(255, 255, 255, 0.9); border-radius: 15px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); }
        #wisdomText { white-space: pre-wrap; word-break: keep-all; }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #4a4a4a; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6 sm:p-12">

    <header class="text-center my-10">
        <h1 class="text-3xl font-bold text-stone-800">지혜의 서사꾼</h1>
        <p class="text-sm text-stone-500 italic mt-2">부처님과 수보리의 대화</p>
    </header>

    <main class="w-full max-w-2xl space-y-8">
        <section class="wisdom-card p-6 border border-stone-200">
            <div class="mb-4 text-left">
                <label class="text-[10px] font-bold text-stone-400 uppercase tracking-widest ml-1">Google Gemini API Key</label>
                <input type="password" id="apiKey" class="w-full mt-1 p-3 text-sm border border-stone-200 rounded-lg focus:outline-none focus:border-stone-500 shadow-sm" placeholder="여기에 API 키를 입력하세요">
            </div>
            <label class="block text-lg font-medium mb-4 text-stone-700">지금 마음을 괴롭히는 파도는 무엇입니까?</label>
            <textarea id="userInput" rows="4" class="w-full p-4 border border-stone-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-stone-200 transition-all resize-none shadow-sm" placeholder="예: 미래에 대한 막연한 불안함이 저를 힘들게 합니다."></textarea>
            <button onclick="generateWisdom()" id="submitBtn" class="mt-6 w-full py-4 bg-stone-800 text-white rounded-xl font-bold hover:bg-stone-700 transition-all shadow-lg active:scale-95">
                부처님께 여쭙기
            </button>
        </section>

        <section id="resultArea" class="hidden space-y-6">
            <div class="wisdom-card p-8 text-lg text-stone-800 border-l-4 border-stone-400" id="wisdomText"></div>
            <div id="meditationTip" class="p-6 bg-stone-800 text-stone-100 rounded-xl text-sm shadow-xl"></div>
        </section>
    </main>

    <footer class="mt-auto py-12 text-stone-400 text-[10px] text-center leading-relaxed">
        본 도구는 태헌 님의 평온을 위해 제작되었습니다.<br>
        © 2026 수보리의 거울. 모든 파도는 결국 바다로 돌아갑니다.
    </footer>

    <script>
        async function generateWisdom() {
            const userInput = document.getElementById('userInput').value;
            const apiKey = document.getElementById('apiKey').value;
            const resultArea = document.getElementById('resultArea');
            const wisdomText = document.getElementById('wisdomText');
            const meditationTip = document.getElementById('meditationTip');
            const submitBtn = document.getElementById('submitBtn');

            if (!userInput || !apiKey) {
                alert("고민 내용과 API Key를 모두 입력해 주세요.");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading-spinner"></span> 침묵 속에서 지혜를 구하는 중...';
            resultArea.classList.add('hidden');

            // 1.5-flash 모델과 v1beta 엔드포인트의 가장 안정적인 조합
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

            const systemPrompt = `너는 초기 불교 경전의 지혜와 에크하르트 톨레의 영성을 결합한 스토리텔링 마스터야. 
다음 사용자의 고민에 대해 '부처와 수보리의 대화' 형식으로 답해줘.
고민: ${userInput}
조건: 
1. 부처님은 '현존'과 '비판단적 수용'을 강조한다.
2. 문체는 차분하고 서정적이며 은유를 사용한다.
3. 마지막에 반드시 "오늘의 명상 실천법:"이라는 문구를 적고 짧은 실천 팁을 적어라.`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: systemPrompt }] }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error.message);
                }

                if (!data.candidates || !data.candidates[0] || !data.candidates[0].content) {
                    throw new Error("AI가 응답을 생성하지 못했습니다. 다시 시도해 주세요.");
                }

                const fullText = data.candidates[0].content.parts[0].text;
                
                // 결과 가공
                let story = fullText;
                let tip = "잠시 숨을 들이마시고 내쉬며, 지금 이 순간에 머무르세요.";
                
                if (fullText.includes("오늘의 명상 실천법:")) {
                    const splitText = fullText.split("오늘의 명상 실천법:");
                    story = splitText[0].trim();
                    tip = splitText[1].trim();
                }

                resultArea.classList.remove('hidden');
                wisdomText.innerText = story;
                meditationTip.innerHTML = "<h4 class='font-bold mb-2 text-stone-300 underline underline-offset-4'>📍 오늘의 명상 가이드</h4>" + tip;

                window.scrollTo({ top: resultArea.offsetTop - 50, behavior: 'smooth' });

            } catch (error) {
                alert("오류가 발생했습니다: " + error.message);
                console.error(error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "부처님께 여쭙기";
            }
        }
    </script>
</body>
</html>
